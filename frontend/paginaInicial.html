--><!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Página Inicial</title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >

    <style>

        .menu-grid {

            display: grid;

            gap: 20px;

            margin-top: 30px;
        }


        .menu-card {

            background: #334155;

            padding: 25px;

            border-radius: 18px;

            cursor: pointer;

            transition: 0.3s;
        }


        .menu-card:hover {

            transform: translateY(-5px);

            background: #475569;
        }


        .menu-card h3 {

            margin-bottom: 10px;
        }


        .menu-card p {

            color: #cbd5e1;
        }

    </style>

</head>

<body>

    <!-- HEADER -->
    <header>

        <nav class="navbar">

            <span>
                Painel do Usuário
            </span>


            <button id="logoutBtn">

                Sair

            </button>

        </nav>

    </header>


    <!-- CONTEÚDO -->
    <main>

        <h1>
            Bem-vindo
        </h1>


        <!-- DADOS USUÁRIO -->
        <div id="dadosUsuario"></div>


        <!-- MENU -->
        <div class="menu-grid">


            <!-- AGENDAR -->
            <div
                class="menu-card"
                onclick="window.location.href='agendar.html'"
            >

                <h3>
                    Novo Agendamento
                </h3>

                <p>
                    Agende um novo horário
                </p>

            </div>


            <!-- MEUS AGENDAMENTOS -->
            <div
                class="menu-card"
                onclick="window.location.href='meusAgendamentos.html'"
            >

                <h3>
                    Meus Agendamentos
                </h3>

                <p>
                    Visualize seus horários
                </p>

            </div>


            <!-- EDITAR PERFIL -->
            <div
                class="menu-card"
                onclick="window.location.href='editarPerfil.html'"
            >

                <h3>
                    Editar Perfil
                </h3>

                <p>
                    Atualize seus dados
                </p>

            </div>

        </div>

    </main>


    <!-- JAVASCRIPT -->
    <script>

        const token =
            localStorage.getItem('tokenUsuario');


        if (!token) {

            window.location.href =
                'login.html';
        }


        async function carregarPerfil() {

            try {

                const resposta = await fetch(
                    '/usuarios/perfil',
                    {

                        headers: {
                            Authorization:
                                'Bearer ' + token
                        }

                    }
                );


                const usuario =
                    await resposta.json();


                document.getElementById(
                    'dadosUsuario'
                ).innerHTML =

                    `
                    <h3>${usuario.nome}</h3>

                    <p>${usuario.email}</p>
                    `;


            } catch (error) {

                console.error(error);

            }

        }


        carregarPerfil();


        document.getElementById(
            'logoutBtn'
        ).addEventListener(
            'click',
            () => {

                localStorage.removeItem(
                    'tokenUsuario'
                );

                window.location.href =
                    'login.html';

            }
        );

    </script>

</body>
</html>
