<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Cadastro</title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >

</head>

<body>

    <!-- HEADER -->
    <header>

        <nav class="navbar">

            <span>
                Sistema Agendamento
            </span>

            <a href="login.html">
                Login
            </a>

        </nav>

    </header>


    <!-- CONTEÚDO -->
    <main>

        <h1>
            Criar Conta
        </h1>


        <!-- FORMULÁRIO -->
        <form id="formCadastro">

            <!-- NOME -->
            <label>
                Nome
            </label>

            <input
                type="text"
                id="nome"
                placeholder="Digite seu nome"
                required
            >


            <!-- EMAIL -->
            <label>
                E-mail
            </label>

            <input
                type="email"
                id="email"
                placeholder="Digite seu e-mail"
                required
            >


            <!-- SENHA -->
            <label>
                Senha
            </label>

            <input
                type="password"
                id="senha"
                placeholder="Digite sua senha"
                required
            >


            <!-- BOTÃO -->
            <button type="submit">

                Criar Conta

            </button>

        </form>


        <!-- MENSAGEM -->
        <p id="mensagem"></p>

    </main>


    <!-- JAVASCRIPT -->
    <script>

        const formCadastro =
            document.getElementById('formCadastro');


        formCadastro.addEventListener(
            'submit',
            async (event) => {

                event.preventDefault();


                const dados = {

                    nome:
                        document.getElementById('nome').value,

                    email:
                        document.getElementById('email').value,

                    senha:
                        document.getElementById('senha').value

                };


                try {

                    const resposta = await fetch(
                        '/usuarios/registrar',
                        {

                            method: 'POST',

                            headers: {
                                'Content-Type': 'application/json'
                            },

                            body: JSON.stringify(dados)

                        }
                    );


                    const resultado =
                        await resposta.json();


                    if (!resposta.ok) {

                        document.getElementById(
                            'mensagem'
                        ).innerText =

                            resultado.message ||
                            'Erro ao cadastrar';

                        return;
                    }


                    document.getElementById(
                        'mensagem'
                    ).innerText =

                        'Conta criada com sucesso!';


                    setTimeout(() => {

                        window.location.href =
                            'login.html';

                    }, 1500);


                } catch (error) {

                    console.error(error);

                    document.getElementById(
                        'mensagem'
                    ).innerText =

                        'Erro de conexão';

                }

            }
        );

    </script>

</body>
</html>
